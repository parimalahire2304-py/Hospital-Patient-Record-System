<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hospital Management System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            height: 100vh;

            /* 🌄 Background Image */
            background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌫 Overlay (for readability) */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 📦 Main Box */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            color: white;
            width: 320px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 26px;
        }

        /* 🔘 Buttons */
        a {
            display: block;
            margin: 12px auto;
            padding: 12px;
            width: 100%;
            text-decoration: none;
            background: linear-gradient(45deg, #28a745, #218838);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        a:hover {
            background: linear-gradient(45deg, #218838, #1e7e34);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>🏥 Hospital System</h1>

        <!-- Patient -->
        <a href="/regPage">➕ Register Patient</a>
        <a href="/patients">📋 View Patients</a>

        <!-- Prescription -->
        <a href="/prescription">💊 Add Prescription</a>
        <a href="/history">📜 View Patient History</a>
    </div>

</body>
</html>
