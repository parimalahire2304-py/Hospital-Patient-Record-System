<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Prescription</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 500px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(45deg, #28a745, #218838);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .msg {
            text-align: center;
            margin-bottom: 10px;
        }

        .success {
            color: lightgreen;
        }

        .error {
            color: red;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <h2>💊 Add Prescription</h2>

    <!-- Messages -->
    <p th:if="${Success}" th:text="${Success}" class="msg success"></p>
    <p th:if="${errorMsg}" th:text="${errorMsg}" class="msg error"></p>

    <!-- FORM -->
    <form th:action="@{/PrescriptionForm}" th:object="${prescription}" method="post">

        <!-- ✅ Patient -->
        <label>Patient ID</label>
        <input type="number" th:field="*{patient.id}" placeholder="Enter Patient ID" required>

        <!-- Date -->
        <label>Date</label>
        <input type="date" th:field="*{date}" required>

        <!-- Symptoms -->
        <label>Symptoms</label>
        <textarea th:field="*{symptoms}" required></textarea>

        <!-- Diagnosis -->
        <label>Diagnosis</label>
        <textarea th:field="*{diagnosis}" required></textarea>

        <!-- Medicine -->
        <label>Medicine</label>
        <textarea th:field="*{medicine}" required></textarea>

        <!-- Notes -->
        <label>Notes</label>
        <textarea th:field="*{note}"></textarea>

        <!-- ✅ Doctor Dropdown -->
        <label>Prescribed By</label>
        <select th:field="*{doctor.id}" required>
            <option value="" disabled selected>-- Select Doctor --</option>
            <option th:each="doc : ${doctors}"
                    th:value="${doc.id}"
                    th:text="${doc.name}">
            </option>
        </select>

        <button type="submit">Save Prescription</button>

    </form>

    <a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
