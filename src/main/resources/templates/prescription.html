<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prescription Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }
        input, textarea {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
        }
        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Prescription Form</h2>

    <!-- Success Message -->
    <p style="color:green;" th:text="${Success}"></p>

    <!-- Error Message -->
    <p style="color:red;" th:text="${errorMsg}"></p>

    <form th:action="@{/PrescriptionForm}" th:object="${prescription}" method="post">

        <!-- Patient ID -->
        <label>Patient ID:</label>
        <input type="number" name="patientId" required />

        <!-- Date -->
        <label>Date:</label>
        <input type="date" th:field="*{date}" required />

        <!-- Symptoms -->
        <label>Symptoms:</label>
        <textarea th:field="*{symptoms}"></textarea>

        <!-- Diagnosis -->
        <label>Diagnosis:</label>
        <textarea th:field="*{diagnosis}"></textarea>

        <!-- Medicine -->
        <label>Medicine:</label>
        <input type="text" th:field="*{medicine}" />

        <!-- Notes -->
        <label>Notes:</label>
        <textarea th:field="*{note}"></textarea>

        <!-- Prescribed By -->
        <label>Doctor Name:</label>
        <input type="text" th:field="*{prescribedBy}" />

        <button type="submit">Save Prescription</button>

    </form>
</div>

</body>
</html>
