<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Doctor</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay {
        background: rgba(0, 0, 0, 0.6);
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
    }

    .form-container {
        position: relative;
        z-index: 1;
        width: 400px;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        color: white;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .back-link {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        text-decoration: none;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: none;
    }

    .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: linear-gradient(45deg, #ffc107, #e0a800);
        color: black;
        cursor: pointer;
    }
</style>

</head>

<body>

<div class="overlay"></div>

<a href="/doctorList" class="back-link">⬅ Back</a>

<div class="form-container">

    <h2>✏ Update Doctor</h2>

    <form th:action="@{/doctorForm}" th:object="${doctor}" method="post">

        <!-- ID hidden -->
        <input type="hidden" th:field="*{id}">

        <input type="text" th:field="*{name}" placeholder="Name" required>

        <input type="text" th:field="*{specialization}" placeholder="Specialization" required>

        <input type="number" th:field="*{experience}" placeholder="Experience" required>

        <input type="text" th:field="*{phoneNo}" placeholder="Phone" required>

        <button type="submit" class="btn">Update Doctor</button>

    </form>

</div>

</body>
</html>
