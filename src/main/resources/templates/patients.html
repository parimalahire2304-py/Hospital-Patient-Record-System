<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Patients</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        height: 100vh;

        /* 🌄 Same background */
        background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;

        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 🌫 Overlay */
    .overlay {
        background: rgba(0, 0, 0, 0.6);
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
    }

    /* 📦 Container */
    .container {
        position: relative;
        z-index: 1;
        width: 1000px;
        background: rgba(255, 255, 255, 0.1);
        padding: 25px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        color: white;
    }

    /* Header */
    .header {
        text-align: center;
        font-size: 26px;
        margin-bottom: 20px;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Add button */
    .add-btn {
        padding: 10px 15px;
        text-decoration: none;
        background: linear-gradient(45deg, #28a745, #218838);
        color: white;
        border-radius: 8px;
        transition: 0.3s;
    }

    .add-btn:hover {
        transform: scale(1.05);
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: rgba(255,255,255,0.1);
    }

    th, td {
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.3);
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr:hover {
        background: rgba(255,255,255,0.1);
    }

    /* Buttons */
    button {
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 2px;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .history-btn {
        background: #17a2b8;
        color: white;
    }

    .edit-btn {
        background: #ffc107;
        color: black;
    }

    .delete-btn {
        background: #dc3545;
        color: white;
    }

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="header">🏥 Hospital Patient Record System</div>

    <div class="top-bar">
        <div>
            <h2>Patient Management</h2>
            <p style="color:#ccc;">Manage all registered patients</p>
        </div>

        <a href="/regPage" class="add-btn">➕ Add Patient</a>
    </div>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        <tr th:each="p : ${patients}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.age}"></td>
            <td th:text="${p.gender}"></td>
            <td th:text="${p.phoneNo}"></td>

            <td>

                <a th:href="@{/history(id=${p.id})}">
                    <button class="history-btn">⏱</button>
                </a>

                <a th:href="@{/edit/{id}(id=${p.id})}">
                    <button class="edit-btn">✏</button>
                </a>

                <a th:href="@{/delete/{id}(id=${p.id})}"
                   onclick="return confirm('Delete this patient?')">
                    <button class="delete-btn">🗑</button>
                </a>

            </td>
        </tr>

        <!-- Empty list -->
        <tr th:if="${#lists.isEmpty(patients)}">
            <td colspan="5">No patients found</td>
        </tr>

    </table>

</div>

</body>
</html>
