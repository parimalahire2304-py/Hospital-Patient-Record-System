<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Patient</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay {
        background: rgba(0, 0, 0, 0.6);
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
    }

    .back-link {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        text-decoration: none;
        font-weight: bold;
    }

    .form-container {
        position: relative;
        z-index: 1;
        width: 400px;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        color: white;
    }

    .form-title {
        text-align: center;
        margin-bottom: 10px;
    }

    .form-subtitle {
        text-align: center;
        margin-bottom: 20px;
        font-size: 16px;
        opacity: 0.8;
    }

    label {
        display: block;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: none;
    }

    input:focus, select:focus {
        outline: none;
        box-shadow: 0 0 5px #007bff;
    }

    .form-row {
        display: flex;
        gap: 10px;
    }

    .form-group {
        flex: 1;
    }

    .button-group {
        display: flex;
        justify-content: space-between;
    }

    .btn-primary {
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: linear-gradient(45deg, #007bff, #0056b3);
        color: white;
        cursor: pointer;
        width: 48%;
    }

    .btn-primary:hover {
        transform: scale(1.05);
    }

    .btn-secondary {
        padding: 10px;
        border-radius: 5px;
        background: gray;
        color: white;
        text-align: center;
        text-decoration: none;
        width: 48%;
        display: inline-block;
    }

    .btn-secondary:hover {
        background: darkgray;
    }

    .success {
        color: lightgreen;
        text-align: center;
        margin-bottom: 10px;
    }

    .error {
        color: red;
        text-align: center;
        margin-bottom: 10px;
    }

    @media (max-width: 500px) {
        .form-container {
            width: 90%;
        }

        .form-row {
            flex-direction: column;
        }
    }
</style>

</head>

<body>

<div class="overlay"></div>

<a href="/patients" class="back-link">⬅ Back</a>

<div class="form-container">

    <h2 class="form-title">✏️ Edit Patient</h2>
    <h3 class="form-subtitle">Patient Information</h3>

    <!-- SUCCESS -->
    <div th:if="${successMsg}" class="success">
        <p th:text="${successMsg}"></p>
    </div>

    <!-- ERROR -->
    <div th:if="${errorMsg}" class="error">
        <p th:text="${errorMsg}"></p>
    </div>

    <form th:action="@{/updatePatient}" th:object="${patient}" method="post">

        <!-- ID -->
        <input type="hidden" th:field="*{id}" />

        <!-- NAME -->
        <label>Name</label>
        <input type="text" th:field="*{name}" required>

        <!-- AGE + GENDER -->
        <div class="form-row">

            <div class="form-group">
                <label>Age</label>
                <input type="number" th:field="*{age}" min="0" max="120" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select th:field="*{gender}" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

        </div>

        <!-- PHONE -->
        <label>Phone</label>
        <input type="tel" th:field="*{phoneNo}" pattern="[6-9][0-9]{9}" required>

        <!-- BUTTONS -->
        <div class="button-group">
            <button type="submit" class="btn-primary">Update</button>
            <a href="/patients" class="btn-secondary">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
