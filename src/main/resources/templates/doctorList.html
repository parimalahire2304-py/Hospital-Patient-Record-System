<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Doctor List</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial;
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay {
        background: rgba(0, 0, 0, 0.6);
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        width: 1000px;
        background: rgba(255, 255, 255, 0.1);
        padding: 25px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        color: white;
    }

    .header {
        text-align: center;
        font-size: 26px;
        margin-bottom: 20px;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .add-btn {
        padding: 10px 15px;
        text-decoration: none;
        background: linear-gradient(45deg, #007bff, #0056b3);
        color: white;
        border-radius: 8px;
        transition: 0.3s;
    }

    .add-btn:hover {
        transform: scale(1.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: rgba(255,255,255,0.1);
    }

    th, td {
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.3);
        text-align: center;
    }

    th {
        background: rgba(0,0,0,0.4);
    }

    tr:hover {
        background: rgba(255,255,255,0.1);
    }

    button {
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 2px;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .edit-btn {
        background: #ffc107;
        color: black;
    }

    .delete-btn {
        background: #dc3545;
        color: white;
    }

    .badge {
        padding: 5px 10px;
        border-radius: 10px;
        background: #17a2b8;
        color: white;
    }

    /* ✅ Improved Back Button */
    .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        text-decoration: none;
        color: white;
        font-weight: bold;
        background: rgba(0,0,0,0.5);
        padding: 8px 12px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .back-btn:hover {
        background: rgba(255,255,255,0.2);
        transform: scale(1.05);
    }

</style>

</head>

<body>

<div class="overlay"></div>

<!-- ✅ BACK BUTTON (FIXED) -->
<a th:href="@{/}" class="back-btn">⬅ Home</a>

<div class="container">

    <div class="header">👨‍⚕️ Doctor Management System</div>

    <div class="top-bar">
        <div>
            <h2>Doctor Management</h2>
            <p style="color:#ccc;">All hospital doctors and specialists</p>
        </div>

        <!-- ✅ Add Doctor -->
        <a th:href="@{/doctor}" class="add-btn">➕ Add Doctor</a>
    </div>

    <table>

        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        <tr th:each="d : ${doctors}">

            <td th:text="${d.name}"></td>

            <td>
                <span class="badge" th:text="${d.specialization}"></span>
            </td>

            <td th:text="${d.experience + ' yrs'}"></td>

            <td th:text="${d.phoneNo}"></td>

            <td>

                <!-- ✏ Edit -->
                <a th:href="@{/editDoctor/{id}(id=${d.id})}">
                    <button class="edit-btn">✏</button>
                </a>

                <!-- 🗑 Delete (POST FIX) -->
                <form th:action="@{/deleteDoctor/{id}(id=${d.id})}" method="post"
                      style="display:inline;">
                    <button class="delete-btn"
                            onclick="return confirm('Delete this doctor?')">🗑</button>
                </form>

            </td>

        </tr>

        <!-- Empty -->
        <tr th:if="${#lists.isEmpty(doctors)}">
            <td colspan="5" style="padding:20px;">No doctors found</td>
        </tr>

    </table>

</div>

</body>
</html>
